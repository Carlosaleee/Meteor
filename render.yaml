services:
  - type: web
    name: ondas-sp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: ondas-sp-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: ondas-sp-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: ondas-sp-db
          property: password
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: ondas-sp-redis
          type: redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: ondas-sp-redis
          type: redis
          property: port
      - key: APP_CORS_ORIGINS
        value: "https://ondas-sp.onrender.com,https://ondas-sp-frontend.onrender.com"
      - key: JAVA_VERSION
        value: 21
      - key: PORT
        value: 8080

databases:
  - name: ondas-sp-db
    plan: free
    databaseName: ondassp
    ipAllowList: []

  - name: ondas-sp-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
